# ============================================================================
# config.tuning.yaml – Optuna-Hyperparametersuche
# ============================================================================
# Dauer: ~2–4 Stunden (A100 GPU) / ~8–12 Stunden (CPU).
#
# Verwendung:
#   PLUTO_PROFILE=tuning ./schaden_forecast_job.sh

data:
  freq: "W-SUN"
  ics_root_dir: "/mnt/ferien-api-data-main/resources/de"

preprocessing:
  lags: [4, 8, 13, 52]
  rolling_windows: [4, 8, 13, 52]
  add_lags: true
  add_yoy: true
  add_ma: true
  add_std: false
  yoy_mode: "log"
  min_periods: 4
  product_aggregation: true

tft:
  n_epochs: 50
  batch_size: 16
  hidden_size: 64
  hidden_continuous_size: 16
  lstm_layers: 2
  dropout: 0.3
  learning_rate: 0.001
  optimizer: "adamw"
  loss: "mse"
  feed_forward: "SwiGLU"
  weight_decay: 5e-4
  gradient_clip_val: 1.0
  use_time_encoders: true
  early_stopping_patience: 5

horizons:
  13:
    name: "h13_model"
    horizon_weeks: 13
    input_chunk_length: 52
    output_chunk_length: 13
    train_length_weeks: 104
    validation_weeks: 39
    stride_weeks: 13
    window_mode: "fixed"
  52:
    name: "h52_model"
    horizon_weeks: 52
    input_chunk_length: 52
    output_chunk_length: 52
    train_length_weeks: 130
    validation_weeks: 52
    stride_weeks: 52
    window_mode: "expanding"

tuning:
  # metric: "combined" = alpha × WAPE + (1-alpha) × sMAPE
  #   WAPE gewichtet nach Volumen (große Produkte zählen mehr),
  #   sMAPE behandelt alle Komponenten gleich.
  #   alpha=0.7 → 70% Fokus auf volumenstarke Produkte.
  #   Alternativen: "wape", "smape", "mae", "rmse"
  13:
    enabled: true
    n_trials: 15
    direction: "minimize"
    metric: "combined"
    tuning_metric_alpha: 0.7
    train_length_min: 78
    train_length_max: 130
    train_length_step: 13
    hidden_size_min: 32
    hidden_size_max: 96
    hidden_size_step: 16
    hidden_continuous_size_min: 8
    hidden_continuous_size_max: 32
    hidden_continuous_size_step: 8
    lstm_layers_min: 1
    lstm_layers_max: 3
    dropout_min: 0.1
    dropout_max: 0.5
    learning_rate_min: 5e-4
    learning_rate_max: 3e-3
    batch_size_choices: [8, 16, 24, 32]
  52:
    enabled: true
    n_trials: 10
    direction: "minimize"
    metric: "combined"
    tuning_metric_alpha: 0.7
    train_length_min: 104
    train_length_max: 156
    train_length_step: 13
    hidden_size_min: 32
    hidden_size_max: 128
    hidden_size_step: 16
    hidden_continuous_size_min: 8
    hidden_continuous_size_max: 48
    hidden_continuous_size_step: 8
    lstm_layers_min: 1
    lstm_layers_max: 3
    dropout_min: 0.1
    dropout_max: 0.5
    learning_rate_min: 3e-4
    learning_rate_max: 2e-3
    batch_size_choices: [8, 16, 24, 32]
