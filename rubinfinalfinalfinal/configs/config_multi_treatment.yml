# ============================================================
# Multi-Treatment Konfiguration
# ============================================================
# Beispielkonfiguration für Multi-Treatment (T in {0, 1, 2, ...}).
# SLearner, TLearner, XLearner, CausalForest und NonParamDML sind bei
# Multi-Treatment nicht verfuegbar (NonParamDML: econml beschraenkt das
# nichtparametrische Final-Model auf Binary Treatment). Verwendet werden
# ParamDML, DRLearner und CausalForestDML, die Multi-Treatment nativ
# unterstuetzen.
# ============================================================

mlflow:
  experiment_name: rubin_multi_treatment

constants:
  SEED: 42

data_files:
  x_file: data/processed/X.parquet
  t_file: data/processed/T.parquet
  y_file: data/processed/Y.parquet

data_processing:
  validate_on: cross
  cross_validation_splits: 5

# Multi-Treatment aktivieren
treatment:
  type: multi
  reference_group: 0

models:
  models_to_train:
    - ParamDML
    - DRLearner
    - CausalForestDML

base_learner:
  type: lgbm
  fixed_params: {}

tuning:
  enabled: true
  n_trials: 50

# Bei Multi-Treatment ist policy_value die relevantere Metrik
# für die Champion-Auswahl als der einfache Qini-Koeffizient.
selection:
  metric: policy_value
  higher_is_better: true

bundle:
  enabled: true
  base_dir: runs/bundles
  log_to_mlflow: true
