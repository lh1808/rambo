# ============================================================================
# VORLAGE — Scoring-Config, saspy-Flow (SAS-Library → Bundle → SAS-Library).
#
# Für einen neuen Use-Case: Datei kopieren als scoring_<usecase>.yml und die
# mit PFLICHT markierten Felder setzen (<…> sind Platzhalter). Alles andere
# hat sinnvolle Defaults. Schritt-für-Schritt: PRODUKTIVSETZUNG.md.
#
#   pixi run -e prod python production/run_scoring_saspy.py --config production/scoring_<usecase>.yml
#
# Die SAS-Verbindung (Host, Port, Auth) kommt aus der saspy-Konfiguration
# (sascfg_personal.py) — Credentials gehören nicht in diese Datei.
# ============================================================================

name: <usecase>             # PFLICHT — bestimmt die Monitoring-Dateinamen
runner: saspy               # Transport-Deklaration für run_scoring.sh:
                            # saspy (dieser Flow) | file (Datei-Flow)
bundle: <pfad/zum/bundle>   # PFLICHT — rubin-Bundle-Verzeichnis (Analysis-Export)

saspy:
  cfgname: <eintrag>          # optional — Eintrag in sascfg_personal.py
                              # (null → saspy-Default-Konfiguration)
  cfgfile: null               # optional — expliziter Pfad zu einer sascfg-Datei
  setup_code: null            # optional — SAS-Code nach Session-Start, wird
                              # log-geprüft; z. B. Libname-Zuweisungen:
                              #   "libname SCORING '/pfad/in'; libname SCOREOUT '/pfad/out';"

input:
  libref: <QUELL_LIBREF>      # PFLICHT — muss in der Session zugewiesen sein
                              # (autoexec oder saspy.setup_code)
  table: <quelltabelle>       # PFLICHT
  where: null                 # optional — SAS-WHERE-Selektion beim Pull
  chunk_size: 500000          # optional — Zeilen pro sd2df-Pull
  uppercase_columns: true     # optional (Default: true) — Spaltennamen → Großschreibung
                              # MUSS zur Schreibweise der Bundle-Features passen
                              # (DataPrep-Bundles: Großschreibung → true) — bei
                              # Mismatch bricht der Lauf mit klarer Meldung ab
  pull_only_needed_columns: true  # optional — keep= auf Bundle-Features + IDs;
                              # erlaubt mehrere Scores mit unterschiedlichen
                              # Feature-Teilmengen gegen dieselbe breite Tabelle,
                              # ohne sie komplett durch die Transportschicht zu bewegen

# PFLICHT (mind. eine) — werden unverändert durchgereicht (kein Modell-Feature;
# Überschneidung mit Features wird hart abgelehnt)
id_columns:
  - <ID_SPALTE>

preprocessing:
  replace_inf_with_nan: true  # optional — Inf → NaN vor dem Transform, damit
                              # die im Bundle gelernte Missing-Behandlung greift
                              # (was genau, bestimmt die Trainings-Konfiguration)

# Modellauswahl — vollständig YAML-gesteuert, UNABHÄNGIG vom Champion
# (Details siehe scoring_template_file.yml; identische Semantik über den
# gemeinsamen Scoring-Kern).
scoring:
  score_p_model: champion     # optional — "champion" (Alias) | konkreter Name
  score_b_model: null         # optional — z. B. SurrogateTree; null → keine SCORE_B-Spalte
  extra_models: []            # optional — zusätzliche Spalten CATE_<Name>
  batch_size: 100000          # optional — Zeilen pro Modell-Predict
  round_decimals: 6           # optional — Score-Rundung

output:
  libref: <ZIEL_LIBREF>       # PFLICHT — muss in der Session zugewiesen sein
  table: <zieltabelle>        # PFLICHT — SAS-Datasets erlauben 32-Zeichen-
                              # Spaltennamen (keine V5-Kürzung wie beim XPT-Weg)
  write_mode: replace         # optional — replace (Zieltabelle vorab löschen)
                              # | append (an den Bestand anhängen)
  write_chunk_size: 500000    # optional — Zeilen pro df2sd + PROC APPEND
  timestamp_format: "%Y-%j"   # optional — TIMESTAMP-Spalte wird automatisch
                              # gesetzt (nicht in meta_columns definieren)
  meta_columns: {}            # optional — konstante Zusatzspalten, z. B.
                              #   SCORE_TYP: <wert>
  column_order: null          # optional — Ziel-Reihenfolge; SCORE_P expandiert
                              # bei Multi-Treatment automatisch (SCORE_P1, …)

# ── Variante: MEHRERE Bundles gegen DENSELBEN Input (Ein-Lade-Modus) ────────
# Wenn das Laden teuer ist (saspy-Transport) und mehrere Modelle/Bundles auf
# derselben Gesamttabelle scoren sollen: statt bundle/scoring/output oben
# eine scores-Liste — der Input wird nur EINMAL gepullt (keep= auf die Union) (Spalten = Union
# aller Bundle-Features + IDs) und pro Eintrag unterschiedlich preprocessed
# und gescort. Preis: die Tabelle bleibt über alle Scores im Speicher.
# Monitoring-Dateien heißen dann <name>_<eintragsname>_….json.
#
# scores:
#   - name: haupt                       # PFLICHT — Log-/Monitoring-Suffix
#     bundle: <pfad/zum/bundle_a>       # PFLICHT
#     output: {libref: <ZIEL_LIB>, table: <ziel_a>}   # PFLICHT (Rest erbt Defaults)
#   - name: variante
#     bundle: <pfad/zum/bundle_b>
#     scoring: {score_p_model: DRLearner}   # optional pro Eintrag
#     output: {libref: <ZIEL_LIB>, table: <ziel_b>}

monitoring:
  dir: <pfad/fuer/monitoring>  # PFLICHT — beim saspy-Flow gibt es keinen
                               # XPT-Pfad als Ablage-Default
  keep_latest_copy: true       # optional — zusätzlich <name>_latest.json überschreiben
