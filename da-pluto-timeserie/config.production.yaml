# ============================================================================
# config.production.yaml – Standard-Produktionskonfiguration
# ============================================================================
# Zweck: Wöchentlicher Regelbetrieb. Trainiert beide Horizonte mit den
# Standard-Hyperparametern und erzeugt die kombinierte 52-Wochen-Prognose.
# Falls im runs/-Verzeichnis getunete Parameter vorliegen, werden diese
# automatisch geladen (tuned_params_dir). Sonst greifen die Defaults.
#
# Dauer: ~20–40 Minuten (GPU, A100) / ~2–3 Stunden (CPU).
#
# Verwendung:
#   export PLUTO_CONFIG=/mnt/da-pluto-timeseries/config.production.yaml
#   python pluto_forecast_job.py

data:
  freq: "W-SUN"
  ics_root_dir: "/mnt/ferien-api-data-main/resources/de"

preprocessing:
  lags: [4, 8, 13, 52]
  rolling_windows: [4, 8, 13, 52]
  add_lags: true
  add_yoy: true
  add_ma: true
  add_std: false
  yoy_mode: "log"
  min_periods: 4
  product_aggregation: true

tft:
  n_epochs: 200
  batch_size: 16
  hidden_size: 64
  hidden_continuous_size: 16
  lstm_layers: 2
  dropout: 0.3
  learning_rate: 0.001
  optimizer: "adamw"
  loss: "mse"
  early_stopping_patience: 15

horizons:
  13:
    name: "h13_model"
    horizon_weeks: 13
    input_chunk_length: 52
    output_chunk_length: 13
    train_length_weeks: 208
    validation_weeks: 52
    stride_weeks: 13
    window_mode: "fixed"
  52:
    name: "h52_model"
    horizon_weeks: 52
    input_chunk_length: 104
    output_chunk_length: 52
    train_length_weeks: 260
    validation_weeks: 104
    stride_weeks: 52
    window_mode: "expanding"      # fixed ist bei ~224 nutzbaren Wochen
                                  # nicht möglich (min. 156 Wochen pro
                                  # Sample, aber erstes Cutoff bei 120)

tuning:
  13:
    enabled: false
  52:
    enabled: false

# Getunete Parameter: werden automatisch aus dem Runs-Verzeichnis
# geladen. Der Pfad wird über die Env-Variable PLUTO_RUNS_DIR gesetzt
# (Default: "runs"). Kein manuelles Setzen nötig.
# tuned_params_dir wird vom Job automatisch auf PLUTO_RUNS_DIR gesetzt.
